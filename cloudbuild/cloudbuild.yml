steps:
  # 1. Build Docker Image
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}", "."]

  # 2. Push Docker Image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}"]

  # 3-1. Deploy API Service to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      - gcloud
      - run
      - deploy
      - ${_API_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --timeout=600
      - --set-secrets=GEMINI_API_KEY_FREE=${_SECRET_GEMINI_API_KEY_FREE}:latest
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID}
      - --command=python
      - --args=-m,src.api.main

  # 3-2. Deploy Worker Service to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      - gcloud
      - run
      - deploy
      - ${_WORKER_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_IMAGE_NAME}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --timeout=600
      - --set-secrets=GEMINI_API_KEY_FREE=${_SECRET_GEMINI_API_KEY_FREE}:latest
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID}
      - --command=python
      - --args=-m,src.worker.main

substitutions:
  _REGION: us-west1
  _REPO_NAME: gemini-news-brief-fastapi
  _IMAGE_NAME: gemini-news-brief-fastapi
  _API_SERVICE_NAME: gemini-news-brief-fastapi-api
  _WORKER_SERVICE_NAME: gemini-news-brief-fastapi-worker
  _SECRET_GEMINI_API_KEY_FREE: GEMINI_API_KEY_FREE  # Secret Manager secret name

options:
  logging: CLOUD_LOGGING_ONLY
