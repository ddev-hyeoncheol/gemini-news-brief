steps:
  # 1. Build Docker Image
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}", "."]

  # 2. Push Docker Image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}"]

  # 3-1. Deploy API Service to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      - gcloud
      - run
      - deploy
      - ${_SERVICE_NAME}-api
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --set-secrets=GEMINI_API_KEY_FREE=${_SECRET_GEMINI_API_KEY_FREE}:latest
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID}
      - --command=uvicorn
      - --args=src.api.main:app,--host,0.0.0.0,--port,8080

  # 3-2. Deploy Worker Service to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      - gcloud
      - run
      - deploy
      - ${_SERVICE_NAME}-worker
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --set-secrets=GEMINI_API_KEY_FREE=${_SECRET_GEMINI_API_KEY_FREE}:latest
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID}
      - --command=uvicorn
      - --args=src.worker.main:app,--host,0.0.0.0,--port,8080

substitutions:
  _SERVICE_NAME: gemini-news-brief-fastapi
  _REGION: us-west1
  _REPO_NAME: gemini-news-brief-fastapi
  _SECRET_GEMINI_API_KEY_FREE: GEMINI_API_KEY_FREE  # Secret Manager secret name

options:
  logging: CLOUD_LOGGING_ONLY
