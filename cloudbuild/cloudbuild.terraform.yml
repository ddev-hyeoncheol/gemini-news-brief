steps:
  # Deploy Infrastructure with Terraform
  # 1. Initialize Terraform: Setup backend and install required providers/plugins
  - name: "hashicorp/terraform:${_TF_VERSION}"
    args: ["init"]
    dir: "terraform"

  # 2. Validate Configuration: Check for syntax errors and configuration consistency
  - name: "hashicorp/terraform:${_TF_VERSION}"
    args: ["validate"]
    dir: "terraform"

  # 3. Plan Changes: Predict infrastructure changes and save to 'tfplan' file
  - name: "hashicorp/terraform:${_TF_VERSION}"
    args: ["plan", "-out=tfplan"]
    dir: "terraform"

  # 4. Apply Changes: Execute the saved 'tfplan' and update real infrastructure
  - name: "hashicorp/terraform:${_TF_VERSION}"
    args: ["apply", "-auto-approve", "tfplan"]
    dir: "terraform"

substitutions:
  _TF_VERSION: "1.15"

options:
  logging: CLOUD_LOGGING_ONLY
